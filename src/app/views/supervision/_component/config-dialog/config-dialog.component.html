<div class="cfg-dialog">

  <div class="cfg-header">
    <mat-icon class="material-symbols-outlined cfg-header__icon">settings</mat-icon>
    <span class="cfg-header__title">Configuration</span>
    <button class="cfg-close-btn" mat-dialog-close>
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <div class="cfg-body">
    <div class="cfg-code-wrapper">
      <pre class="cfg-code" [innerHTML]="highlighted"></pre>
      <button class="copy-overlay" (click)="copy()" [class.copied]="copied" [matTooltip]="copied ? 'Copié !' : 'Copier'">
        <mat-icon>{{ copied ? 'check' : 'content_copy' }}</mat-icon>
      </button>
    </div>
  </div>

</div>

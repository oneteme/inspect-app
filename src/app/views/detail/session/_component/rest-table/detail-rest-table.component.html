<jquery-table class="flex-table"
             [config]="tableConfig" [data]="_requests" [isLoading]="isLoading">
  <ng-template jqtCellDef="resource" let-row>
    <span style="font-weight: bold;" [ngStyle]="{'color': row.protocol=='https' ? 'green':'gray'}">{{ row.method | typeColumnFormat }} </span>
    <br>
    <span [title]="row.path">{{ row.path }}</span>
  </ng-template>

  <ng-template jqtCellDef="start" let-row>
    {{ (row.start*1000 | date:'dd/MM/yyyy')}}
    <br>
    {{ (row.start*1000 | date:'HH:mm:ss.SSS')}}
  </ng-template>

  <ng-template jqtCellDef="duration" let-row>
    <div *ngIf="!row.end" style="display: flex; align-items: center; gap: 6px;">
      <mat-spinner [diameter]="14"></mat-spinner>
      <span class="cell-secondary">En cours...</span>
    </div>
    <div *ngIf="row.end" class="cell-primary" [matTooltip]="row.end * 1000 | date:'dd/MM/yyyy, HH:mm:ss.SSS':'fr'">
      {{ { start: row.start, end: row.end } | duration }}
    </div>
  </ng-template>

  <ng-template jqtCellDef="action" let-row>
    <button matTooltip="Détail de la session" [style.visibility]="row.linked || row.status == 0 ? 'visible' : 'hidden'" mat-icon-button color="primary"
            (click)="selectedRemote($event, row.id)">
      <mat-icon class="material-symbols-outlined">link</mat-icon>
    </button>
  </ng-template>
</jquery-table>

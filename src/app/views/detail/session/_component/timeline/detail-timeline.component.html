<app-timeline *ngIf="instance && request"
                  [options]="options"
                  [groups]="dataGroups"
                  [items]="dataItems"
                  (onTimelineCreated)="onTimelineCreate($event)"
                  (onItemCLicked)="onItemCLicked($event)">
  <div class="legend">
    <div class="legend-chips">
      <div *ngIf="request.restRequests?.length" class="chip api"
           [class.inactive]="!isFilterActive('rest')"
           (click)="toggleFilter('rest')">
        <span class="chip-dot"></span>HTTP
      </div>
      <div *ngIf="request.ftpRequests?.length" class="chip ftp"
           [class.inactive]="!isFilterActive('ftp')"
           (click)="toggleFilter('ftp')">
        <span class="chip-dot"></span>FTP
      </div>
      <div *ngIf="request.mailRequests?.length" class="chip smtp"
           [class.inactive]="!isFilterActive('smtp')"
           (click)="toggleFilter('smtp')">
        <span class="chip-dot"></span>SMTP
      </div>
      <div *ngIf="request.ldapRequests?.length" class="chip ldap"
           [class.inactive]="!isFilterActive('ldap')"
           (click)="toggleFilter('ldap')">
        <span class="chip-dot"></span>LDAP
      </div>
      <div *ngIf="request.databaseRequests?.length" class="chip bdd"
           [class.inactive]="!isFilterActive('jdbc')"
           (click)="toggleFilter('jdbc')">
        <span class="chip-dot"></span>JDBC
      </div>
      <div *ngIf="request.localRequests?.length" class="chip local"
           [class.inactive]="!isFilterActive('local')"
           (click)="toggleFilter('local')">
        <span class="chip-dot"></span>LOCAL
      </div>
      <div *ngIf="request['userActions']?.length" class="chip action"
           [class.inactive]="!isFilterActive('action')"
           (click)="toggleFilter('action')">
        <span class="chip-dot"></span>Action
      </div>
    </div>
  </div>
</app-timeline>

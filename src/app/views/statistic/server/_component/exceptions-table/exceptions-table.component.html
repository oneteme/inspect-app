<jquery-table class="flex-table" [config]="tableConfig" [data]="_requests" [isLoading]="isLoading">
  <ng-template jqtCellDef="percent" let-row>
    <span [matTooltip]="row.count+'/'+row.countok" style="font-weight: bold; color: #ff0000;">{{(row.count*100)/row.countok | number : '1.0-2' }}%</span>
  </ng-template>
</jquery-table>

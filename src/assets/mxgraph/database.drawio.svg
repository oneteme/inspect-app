<?xml version="1.0" encoding="UTF-8"?>
<!-- Do not edit this file with editors other than draw.io -->
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" version="1.1" width="39px" height="51px" viewBox="-0.5 -0.5 39 51">
  <defs>
    <filter id="dbShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#00000050"/>
    </filter>

    <!-- 3D shading on cylinder body -->
    <linearGradient id="cylGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#065f46"/>
      <stop offset="35%"  stop-color="#059669"/>
      <stop offset="70%"  stop-color="#047857"/>
      <stop offset="100%" stop-color="#022c22"/>
    </linearGradient>

    <!-- Fill liquid color -->
    <linearGradient id="fillGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#059669"/>
      <stop offset="40%"  stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>

    <!-- Top cap 3D shading -->
    <radialGradient id="capGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%"   stop-color="#6ee7b7"/>
      <stop offset="60%"  stop-color="#34d399"/>
      <stop offset="100%" stop-color="#047857"/>
    </radialGradient>

    <!-- Clip to cylinder body -->
    <clipPath id="cylClip">
      <path d="M 18.44 25.63 C 19.6 27.08 23.62 28.09 28.22 28.09
               C 32.82 28.09 36.83 27.08 37.99 25.63
               L 37.99 45.86 C 37.73 46.95 36.49 47.96 34.51 48.71
               C 31 49.94 26.09 50 22.43 48.86
               C 20.26 48.26 18.77 47.14 18.44 45.86 Z"/>
    </clipPath>
    <!-- Fade top (dark → transparent) -->
    <linearGradient id="fadeTB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#047857" stop-opacity="1"/>
      <stop offset="100%" stop-color="#047857" stop-opacity="0"/>
    </linearGradient>
    <!-- Fade bottom (transparent → dark) -->
    <linearGradient id="fadeBT" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#047857" stop-opacity="0"/>
      <stop offset="100%" stop-color="#047857" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <g filter="url(#dbShadow)">
    <!-- Server tower body -->
    <path d="M 0 49.76 L 0 2.4 C 0.05 1.13 1.05 0.1 2.32 0 L 22.03 0
             C 23.35 0.05 24.4 1.1 24.45 2.4 L 24.45 17.58
             C 19.79 17.98 16.25 20.07 15.92 22.63
             L 15.92 37.62 L 3.69 37.62 L 3.69 40.01 L 15.92 40.01
             L 15.92 42.46 L 3.69 42.46 L 3.69 44.86 L 15.92 44.86
             C 15.84 46.85 16.87 48.72 18.59 49.76 Z"
          fill="#5d7fd8" stroke="#172a6b" stroke-width="0.6"/>

    <!-- LED bar — slow green blink -->
    <path d="M 3.69 9.74 L 20.92 9.74 L 20.92 7.29 L 3.69 7.29 Z" fill="#93c5fd" stroke="none">
      <animate attributeName="fill" values="#93c5fd;#34d399;#93c5fd"
               dur="3.5s" repeatCount="indefinite" calcMode="spline"
               keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    </path>

    <!-- DB cylinder body — 3D gradient, dark = empty -->
    <path d="M 18.44 25.63 C 19.6 27.08 23.62 28.09 28.22 28.09
             C 32.82 28.09 36.83 27.08 37.99 25.63
             L 37.99 45.86 C 37.73 46.95 36.49 47.96 34.51 48.71
             C 31 49.94 26.09 50 22.43 48.86
             C 20.26 48.26 18.77 47.14 18.44 45.86 Z"
          fill="url(#cylGrad)" stroke="#022c22" stroke-width="0.6"/>

    <!-- ── BINARY COLUMNS — alternate up/down scroll ── -->
    <g clip-path="url(#cylClip)" font-family="monospace" font-size="3.2" fill="#34d399">

      <!-- Col 1 — scrolls UP -->
      <g>
        <animateTransform attributeName="transform" type="translate"
                          values="0,0;0,-22;0,-22;0,0" keyTimes="0;0.5;0.5;1"
                          dur="4s" repeatCount="indefinite" calcMode="spline"
                          keySplines="0.4 0 0.6 1;0 0 1 1;0 0 0.6 1"/>
        <text x="20.5" y="30">1</text>
        <text x="20.5" y="34">0</text>
        <text x="20.5" y="38">1</text>
        <text x="20.5" y="42">1</text>
        <text x="20.5" y="46">0</text>
        <text x="20.5" y="50">1</text>
        <!-- repeat for seamless loop -->
        <text x="20.5" y="54">0</text>
        <text x="20.5" y="58">1</text>
      </g>

      <!-- Col 2 — scrolls DOWN -->
      <g>
        <animateTransform attributeName="transform" type="translate"
                          values="0,0;0,22;0,22;0,0" keyTimes="0;0.5;0.5;1"
                          dur="5s" repeatCount="indefinite" calcMode="spline"
                          keySplines="0.4 0 0.6 1;0 0 1 1;0 0 0.6 1"/>
        <text x="24.5" y="26">0</text>
        <text x="24.5" y="30">1</text>
        <text x="24.5" y="34">0</text>
        <text x="24.5" y="38">0</text>
        <text x="24.5" y="42">1</text>
        <text x="24.5" y="46">1</text>
        <text x="24.5" y="50">0</text>
      </g>

      <!-- Col 3 — scrolls UP, faster -->
      <g>
        <animateTransform attributeName="transform" type="translate"
                          values="0,0;0,-22;0,-22;0,0" keyTimes="0;0.5;0.5;1"
                          dur="3.2s" repeatCount="indefinite" calcMode="spline"
                          keySplines="0.4 0 0.6 1;0 0 1 1;0 0 0.6 1"/>
        <text x="28.5" y="32">1</text>
        <text x="28.5" y="36">1</text>
        <text x="28.5" y="40">0</text>
        <text x="28.5" y="44">1</text>
        <text x="28.5" y="48">0</text>
        <text x="28.5" y="52">1</text>
        <text x="28.5" y="56">0</text>
      </g>

      <!-- Col 4 — scrolls DOWN, slower -->
      <g>
        <animateTransform attributeName="transform" type="translate"
                          values="0,0;0,22;0,22;0,0" keyTimes="0;0.5;0.5;1"
                          dur="6s" repeatCount="indefinite" calcMode="spline"
                          keySplines="0.4 0 0.6 1;0 0 1 1;0 0 0.6 1"/>
        <text x="32.5" y="28">0</text>
        <text x="32.5" y="32">0</text>
        <text x="32.5" y="36">1</text>
        <text x="32.5" y="40">0</text>
        <text x="32.5" y="44">1</text>
        <text x="32.5" y="48">1</text>
        <text x="32.5" y="52">0</text>
      </g>

      <!-- Fade top & bottom edges so digits fade into cylinder -->
      <rect x="17" y="25" width="22" height="5" fill="url(#fadeTB)"/>
      <rect x="17" y="43" width="22" height="8" fill="url(#fadeBT)"/>
    </g>

    <!-- DB cylinder top cap — 3D radial shading, glows when full -->
    <path d="M 27.99 19.78 C 22.66 19.82 18.41 21.4 18.51 23.32
             C 18.61 25.24 23.01 26.76 28.34 26.73
             C 33.68 26.73 38 25.17 38 23.25
             C 38 21.34 33.68 19.78 28.34 19.78 Z"
          fill="url(#capGrad)" stroke="#059669" stroke-width="0.6">
      <!-- Glow pulse when DB is full -->
      <animate attributeName="filter-brightness" values="1;1.3;1" dur="9s"
               repeatCount="indefinite"/>
      <animate attributeName="stroke" values="#059669;#6ee7b7;#059669"
               keyTimes="0;0.72;0.92" dur="9s" repeatCount="indefinite"/>
    </path>

    <!-- Cap highlight ellipse — top-left light reflection -->
    <ellipse cx="24.5" cy="22" rx="3.5" ry="1"
             fill="#ffffff" fill-opacity="0.2" stroke="none"
             transform="rotate(-10 24.5 22)"/>
  </g>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<!-- Do not edit this file with editors other than draw.io -->
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" width="41px" height="54px" viewBox="-0.5 -0.5 41 54">
  <defs>
    <filter id="msShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#00000050"/>
    </filter>

    <!-- 3D shading: radial light from top-left -->
    <radialGradient id="globeLight" cx="35%" cy="30%" r="65%" fx="35%" fy="30%">
      <stop offset="0%"   stop-color="#bae6fd" stop-opacity="1"/>
      <stop offset="40%"  stop-color="#0ea5e9" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0c4a6e" stop-opacity="1"/>
    </radialGradient>

    <!-- Dark shadow hemisphere (right/bottom) -->
    <radialGradient id="globeShadow" cx="70%" cy="70%" r="55%">
      <stop offset="0%"   stop-color="#000000" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- Atmosphere glow around edge -->
    <radialGradient id="atmosphere" cx="50%" cy="50%" r="50%">
      <stop offset="75%"  stop-color="#38bdf8" stop-opacity="0"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.45"/>
    </radialGradient>

    <!-- Clip to globe circle -->
    <clipPath id="globeClip">
      <path d="M 27.35 52.89 C 24.02 52.89 20.84 51.57 18.5 49.21
               C 16.17 46.85 14.87 43.66 14.92 40.34
               C 14.92 37.06 16.23 33.9 18.56 31.58
               C 20.89 29.26 24.05 27.95 27.35 27.95
               C 30.66 27.92 33.85 29.22 36.21 31.54
               C 38.56 33.87 39.88 37.04 39.88 40.34
               C 40 43.7 38.72 46.95 36.35 49.33
               C 33.97 51.71 30.71 53 27.35 52.89 Z"/>
    </clipPath>
  </defs>

  <g filter="url(#msShadow)">
    <!-- Server tower body -->
    <path d="M 0 52.47 L 0 2.9 C 0.05 1.55 1.13 0.45 2.49 0.37 L 22.85 0.37
             C 24.27 0.37 25.44 1.49 25.5 2.9 L 25.5 25.95
             C 18.48 26.92 13.14 32.71 12.75 39.76
             L 3.81 39.76 L 3.81 42.35 L 12.85 42.35
             C 12.96 43.21 13.16 44.06 13.44 44.88 L 3.81 44.88 L 3.81 47.41
             L 14.49 47.41 C 15.57 49.48 17.18 51.22 19.15 52.47 Z"
          fill="#5d7fd8" stroke="#172a6b" stroke-width="0.6"/>

    <!-- LED bar — blinks green -->
    <path d="M 3.94 10.48 L 21.72 10.55 L 21.66 8.11 L 3.94 7.98 Z"
          fill="#93c5fd" stroke="none">
      <animate attributeName="fill" values="#93c5fd;#34d399;#93c5fd"
               dur="3s" repeatCount="indefinite" calcMode="spline"
               keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    </path>

    <!-- ── GLOBE ── -->

    <!-- 1. Base sphere — 3D radial light -->
    <path d="M 27.35 52.89 C 24.02 52.89 20.84 51.57 18.5 49.21
             C 16.17 46.85 14.87 43.66 14.92 40.34
             C 14.92 37.06 16.23 33.9 18.56 31.58
             C 20.89 29.26 24.05 27.95 27.35 27.95
             C 30.66 27.92 33.85 29.22 36.21 31.54
             C 38.56 33.87 39.88 37.04 39.88 40.34
             C 40 43.7 38.72 46.95 36.35 49.33
             C 33.97 51.71 30.71 53 27.35 52.89 Z"
          fill="url(#globeLight)" stroke="#0369a1" stroke-width="0.6">
      <animate attributeName="opacity" values="1;0.88;1" dur="4s"
               repeatCount="indefinite" calcMode="spline"
               keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    </path>

    <!-- 2. Grid lines — rotate left→right, clipped & semi-transparent for depth -->
    <g clip-path="url(#globeClip)">
      <g opacity="0.55">
        <animateTransform attributeName="transform" type="rotate"
                          from="0 27.35 40.34" to="-360 27.35 40.34"
                          dur="18s" repeatCount="indefinite"/>
        <!-- Meridian segments -->
        <path d="M 23.86 50.26 C 23.05 49.25 22.52 48.05 22.32 46.78
                 C 21.39 46.95 20.49 47.24 19.62 47.62
                 C 20.8 48.84 22.25 49.77 23.86 50.31 Z
                 M 22.48 33.75 C 22.77 32.61 23.22 31.51 23.8 30.48
                 C 22.36 31.07 21.04 31.91 19.89 32.96
                 C 20.72 33.32 21.59 33.58 22.48 33.75 Z
                 M 34.75 32.96 C 33.66 31.95 32.41 31.13 31.05 30.53
                 C 31.61 31.55 32.04 32.63 32.32 33.75
                 C 33.15 33.57 33.97 33.3 34.75 32.96 Z
                 M 35.18 47.62 C 34.29 47.21 33.34 46.93 32.37 46.78
                 C 32.08 48.04 31.59 49.24 30.94 50.36
                 C 32.56 49.8 34.01 48.86 35.18 47.62 Z"
              fill="#1e3a8a" stroke="none"/>
        <!-- Lat/long cells -->
        <path d="M 16.87 41.4 C 17 43.04 17.5 44.63 18.35 46.04
                 C 19.51 45.5 20.74 45.12 22 44.93
                 C 21.72 43.78 21.6 42.59 21.63 41.4 Z
                 M 21.63 39.39 C 21.58 38.1 21.73 36.8 22.06 35.54
                 C 20.89 35.35 19.75 34.99 18.67 34.49
                 C 17.63 35.94 16.98 37.63 16.77 39.39 Z
                 M 37.93 39.39 C 37.7 37.65 37.07 35.99 36.08 34.54
                 C 35.02 35.04 33.9 35.39 32.74 35.6
                 C 33.02 36.86 33.15 38.15 33.11 39.45 Z
                 M 33.11 41.45 C 33.14 42.62 33.03 43.79 32.8 44.93
                 C 34.02 45.16 35.21 45.53 36.34 46.04
                 C 37.21 44.63 37.75 43.04 37.93 41.4 Z
                 M 23.86 44.67 C 26.2 44.21 28.6 44.21 30.94 44.67
                 C 31.16 43.59 31.27 42.5 31.26 41.4 L 23.54 41.4
                 C 23.51 42.5 23.61 43.6 23.86 44.67 Z
                 M 31.21 39.39 C 31.26 38.23 31.15 37.05 30.89 35.91
                 C 28.56 36.31 26.18 36.31 23.86 35.91
                 C 23.6 37.05 23.49 38.23 23.54 39.39 Z"
              fill="#93c5fd" stroke="none"/>
        <!-- Polar caps -->
        <path d="M 26.4 30.32 C 25.36 31.36 24.66 32.68 24.39 34.12
                 C 26.38 34.45 28.42 34.45 30.42 34.12
                 C 30.04 32.72 29.36 31.42 28.41 30.32
                 C 27.84 29.76 26.96 29.76 26.4 30.32 Z
                 M 28.56 50.36 C 29.49 49.2 30.16 47.85 30.52 46.41
                 C 28.47 46.12 26.38 46.14 24.33 46.46
                 C 24.62 47.92 25.32 49.28 26.34 50.36
                 C 26.62 50.7 27.03 50.9 27.45 50.9
                 C 27.88 50.9 28.28 50.7 28.56 50.36 Z"
              fill="#e0f2fe" stroke="none"/>
      </g>
    </g>

    <!-- 3. Shadow overlay — darker right/bottom hemisphere -->
    <path d="M 27.35 52.89 C 24.02 52.89 20.84 51.57 18.5 49.21
             C 16.17 46.85 14.87 43.66 14.92 40.34
             C 14.92 37.06 16.23 33.9 18.56 31.58
             C 20.89 29.26 24.05 27.95 27.35 27.95
             C 30.66 27.92 33.85 29.22 36.21 31.54
             C 38.56 33.87 39.88 37.04 39.88 40.34
             C 40 43.7 38.72 46.95 36.35 49.33
             C 33.97 51.71 30.71 53 27.35 52.89 Z"
          fill="url(#globeShadow)" stroke="none" pointer-events="none"/>

    <!-- 4. Atmosphere ring -->
    <path d="M 27.35 52.89 C 24.02 52.89 20.84 51.57 18.5 49.21
             C 16.17 46.85 14.87 43.66 14.92 40.34
             C 14.92 37.06 16.23 33.9 18.56 31.58
             C 20.89 29.26 24.05 27.95 27.35 27.95
             C 30.66 27.92 33.85 29.22 36.21 31.54
             C 38.56 33.87 39.88 37.04 39.88 40.34
             C 40 43.7 38.72 46.95 36.35 49.33
             C 33.97 51.71 30.71 53 27.35 52.89 Z"
          fill="url(#atmosphere)" stroke="none" pointer-events="none"/>

    <!-- 5. Specular highlight — top-left bright spot -->
    <ellipse cx="23" cy="32.5" rx="3.5" ry="2.2"
             fill="#ffffff" fill-opacity="0.28" stroke="none"
             transform="rotate(-20 23 32.5)"/>

  </g>
</svg>

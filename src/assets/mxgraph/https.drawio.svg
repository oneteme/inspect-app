  <defs>
    <filter id="httpsShadow" x="-15%" y="-15%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#6d28d940"/>
    </filter>
  </defs>
  <g filter="url(#httpsShadow)">
    <!-- Shackle — violet, subtle up/down float -->
    <g>
      <animateTransform attributeName="transform" type="translate"
                        values="0,0; 0,-1.5; 0,0" dur="3s"
                        repeatCount="indefinite" calcMode="spline"
                        keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
      <path d="M 21.96 16.39 L 21.96 10.57 C 21.96 7.1 18.82 3.17 14.02 3.17
               C 9.18 3.17 6.04 7.08 6.04 10.77 L 6.04 16.39 Z"
            fill="#8b5cf6" stroke="#6d28d9" stroke-width="1" stroke-linejoin="round"/>
      <path d="M 19 16.39 L 19 10.8 C 19 8.4 16.8 6 14 6
               C 11.2 6 9 8.4 9 10.8 L 9 16.39 Z"
            fill="#a78bfa" stroke="none"/>
    </g>
    <!-- Lock body — dark slate, always static -->
    <rect x="0" y="16.39" width="28" height="20.61" rx="2.5"
          fill="#1e293b" stroke="#0f172a" stroke-width="0.8"/>
    <rect x="0" y="16.39" width="28" height="3" rx="2.5"
          fill="#334155" stroke="none"/>
    <!-- Keyhole outer — pulses glow -->
    <circle cx="14" cy="26" r="4" fill="#7c3aed" stroke="#5b21b6" stroke-width="0.5">
      <animate attributeName="r" values="4;4.8;4" dur="2.5s"

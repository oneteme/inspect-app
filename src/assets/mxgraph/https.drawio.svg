               keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
      <animate attributeName="fill" values="#7c3aed;#a78bfa;#7c3aed" dur="2.5s"
               repeatCount="indefinite" calcMode="spline"
               keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    </circle>
    <circle cx="14" cy="25.5" r="1.8" fill="#f1f5f9" stroke="none"/>
    <rect x="12.8" y="26.5" width="2.4" height="3.5" rx="0.5" fill="#f1f5f9" stroke="none"/>
  </g>
